<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ezi Nurse AI</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; padding: 20px; display: flex; justify-content: center; }
        #chat-window { width: 100%; max-width: 500px; background: white; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; height: 80vh; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; border-bottom: 1px solid #eee; }
        #input-area { padding: 15px; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        .msg { margin-bottom: 15px; padding: 10px; border-radius: 8px; max-width: 85%; }
        .user { background: #e3f2fd; align-self: flex-end; margin-left: auto; }
        .bot { background: #f1f1f1; align-self: flex-start; }
    </style>
</head>
<body>
    <div id="chat-window">
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="userInput" placeholder="Ask about a nursing topic...">
            <button onclick="send()">Send</button>
        </div>
    </div>

    <script>
        let history = [];
        const msgDiv = document.getElementById('messages');

        async function send() {
            const input = document.getElementById('userInput');
            const text = input.value;
            if(!text) return;

            addMsg(text, 'user');
            history.push({ role: 'user', text: text });
            input.value = '';

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ history })
                });
                
                const data = await res.json();
                
                if (data.error) {
                    addMsg("⚠️ Error: " + data.error, 'bot');
                } else if (data.text) {
                    addMsg(data.text, 'bot');
                    history.push({ role: 'model', text: data.text });
                } else {
                    addMsg("⚠️ Vercel Server Error. Check Vercel logs.", 'bot');
                }
            } catch (err) {
                addMsg("⚠️ Connection Error: " + err.message, 'bot');
            }
        }

        function addMsg(text, sender) {
            const div = document.createElement('div');
            div.className = `msg ${sender}`;
            div.innerHTML = marked.parse(text);
            msgDiv.appendChild(div);
            msgDiv.scrollTop = msgDiv.scrollHeight;
        }
    </script>
</body>
</html>
